<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="map"></div>

  <!-- Wiki Modal -->
  <div id="wiki-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div id="wiki-cover" class="wiki-cover" style="display: none;"></div>
      <div class="modal-header">
        <h2 id="wiki-title"></h2>
        <button class="modal-close" onclick="closeWikiModal()">&times;</button>
      </div>
      <div id="wiki-editor" class="wiki-content"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <!-- Markers data -->
  <script src="markers.js"></script>

  <!-- Tiptap for rendering wiki content -->
  <script type="module">
    import { Editor } from 'https://esm.sh/@tiptap/core';
    import StarterKit from 'https://esm.sh/@tiptap/starter-kit';
    import Image from 'https://esm.sh/@tiptap/extension-image';

    // Store editor instances globally
    let wikiEditor = null;
    let popupEditors = new Map();

    // Render content to a given element using Tiptap
    function renderTiptapContent(element, content) {
      if (!element) return null;

      // Parse JSON content if it's a string
      let parsedContent = content;
      if (typeof content === 'string') {
        try {
          parsedContent = JSON.parse(content);
        } catch (e) {
          // If parsing fails, assume it's HTML/plain text
          element.innerHTML = content;
          return null;
        }
      }

      // Create read-only Tiptap editor to render content
      const editor = new Editor({
        element: element,
        extensions: [
          StarterKit,
          Image.configure({
            HTMLAttributes: {
              class: 'wiki-image',
            },
          }),
        ],
        content: parsedContent || '',
        editable: false,
      });

      return editor;
    }

    // Initialize wiki editor
    function initWikiEditor(content) {
      const editorElement = document.getElementById('wiki-editor');

      // Destroy existing editor if any
      if (wikiEditor) {
        wikiEditor.destroy();
      }

      wikiEditor = renderTiptapContent(editorElement, content);
    }

    // Initialize popup description editor
    function initPopupDescription(markerId, content) {
      const editorElement = document.getElementById('popup-desc-' + markerId);
      if (!editorElement) return;

      // Destroy existing editor for this popup if any
      if (popupEditors.has(markerId)) {
        popupEditors.get(markerId).destroy();
      }

      const editor = renderTiptapContent(editorElement, content);
      if (editor) {
        popupEditors.set(markerId, editor);
      }
    }

    // Destroy popup description editor
    function destroyPopupDescription(markerId) {
      if (popupEditors.has(markerId)) {
        popupEditors.get(markerId).destroy();
        popupEditors.delete(markerId);
      }
    }

    // Make functions available globally
    window.initWikiEditor = initWikiEditor;
    window.destroyWikiEditor = function() {
      if (wikiEditor) {
        wikiEditor.destroy();
        wikiEditor = null;
      }
    };
    window.initPopupDescription = initPopupDescription;
    window.destroyPopupDescription = destroyPopupDescription;
  </script>

  <!-- Map initialization -->
  <script>
    // Initialize the map with same coordinate system as Realmwalker
    // Uses L.CRS.Simple with negative Y coordinates (origin at top-left)
    const mapBounds = [[0, 0], [-256, 256]];

    const map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: 0,
      maxZoom: mapConfig.maxZoom,
      center: [-128, 128],
      zoom: 2,
      maxBounds: mapBounds,
      maxBoundsViscosity: 1.0,
    });

    // Add tile layer - uses {z}/{y}/{x} pattern matching Google tile layout
    L.tileLayer('./tiles/{z}/{y}/{x}.webp', {
      minZoom: 0,
      maxZoom: mapConfig.maxZoom,
      tileSize: mapConfig.tileSize,
      noWrap: true,
      bounds: mapBounds,
    }).addTo(map);

    // Icon size mappings
    const iconSizes = {
      small: [20, 20],
      medium: [32, 32],
      large: [48, 48],
    };

    // Add markers
    markers.forEach(function(markerData) {
      // Create icon if specified
      let icon = undefined;
      if (markerData.icon) {
        const size = iconSizes[markerData.iconSize] || iconSizes.medium;
        icon = L.icon({
          iconUrl: markerData.icon,
          iconSize: size,
          iconAnchor: [size[0] / 2, size[1] / 2],
          popupAnchor: [0, -size[1] / 2],
        });
      }

      // Create marker
      const markerOptions = icon ? { icon: icon } : {};
      const marker = L.marker([markerData.lat, markerData.lng], markerOptions);

      // Create popup content with dark theme
      let popupContent = '<div class="marker-popup">';

      // Add marker image if available
      if (markerData.markerImage) {
        popupContent += '<div class="marker-popup-image"><img src="' + markerData.markerImage + '" alt="' + escapeHtml(markerData.title) + '"></div>';
      }

      popupContent += '<h3>' + escapeHtml(markerData.title) + '</h3>';

      if (markerData.description) {
        popupContent += '<div id="popup-desc-' + markerData.id + '" class="marker-description"></div>';
      }

      if (markerData.wikiPage) {
        popupContent += '<button class="wiki-link" onclick="openWikiModal(\'' +
          markerData.id + '\')">View Wiki Entry</button>';
      }

      popupContent += '</div>';

      marker.bindPopup(popupContent, {
        className: 'dark-popup',
        maxWidth: 300,
      });

      // Initialize Tiptap for description when popup opens
      marker.on('popupopen', function() {
        if (markerData.description && window.initPopupDescription) {
          window.initPopupDescription(markerData.id, markerData.description);
        }
      });

      // Cleanup when popup closes
      marker.on('popupclose', function() {
        if (window.destroyPopupDescription) {
          window.destroyPopupDescription(markerData.id);
        }
      });

      // Handle min zoom visibility
      if (markerData.minZoom !== undefined) {
        function updateVisibility() {
          if (map.getZoom() >= markerData.minZoom) {
            if (!map.hasLayer(marker)) {
              marker.addTo(map);
            }
          } else {
            if (map.hasLayer(marker)) {
              map.removeLayer(marker);
            }
          }
        }

        map.on('zoomend', updateVisibility);
        updateVisibility();
      } else {
        marker.addTo(map);
      }
    });

    // Helper function to escape HTML
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Wiki modal functions
    function openWikiModal(markerId) {
      const markerData = markers.find(m => m.id === markerId);
      if (!markerData || !markerData.wikiPage) return;

      // Set title
      document.getElementById('wiki-title').textContent = markerData.wikiPage.name;

      // Handle cover image
      const coverElement = document.getElementById('wiki-cover');
      if (markerData.wikiPage.coverImage) {
        coverElement.style.backgroundImage = 'url(' + markerData.wikiPage.coverImage + ')';
        coverElement.style.display = 'block';
      } else {
        coverElement.style.display = 'none';
      }

      // Initialize Tiptap editor with wiki content
      if (window.initWikiEditor) {
        window.initWikiEditor(markerData.wikiPage.content);
      } else {
        // Fallback if Tiptap hasn't loaded yet
        document.getElementById('wiki-editor').innerHTML = markerData.wikiPage.content;
      }

      document.getElementById('wiki-modal').style.display = 'flex';
    }

    function closeWikiModal() {
      document.getElementById('wiki-modal').style.display = 'none';
      if (window.destroyWikiEditor) {
        window.destroyWikiEditor();
      }
    }

    // Close modal when clicking outside
    document.getElementById('wiki-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeWikiModal();
      }
    });

    // Close modal with escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeWikiModal();
      }
    });
  </script>
</body>
</html>
